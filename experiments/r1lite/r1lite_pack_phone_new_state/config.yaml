# OpenPI R1Lite experiment config for the new phone assembly dataset with pi0.5 state tokens enabled.
# This file is intentionally independent from ConRFT env configs. Do not add
# ConRFT-style action scale here; OpenPI action normalization is handled by
# LeRobot norm stats, and SpaceMouse teleop uses explicit physical scales below.

experiment:
  name: "r1lite_pack_phone_new_state"  # Stable experiment id used by --experiment.
  task_desc: "first scoop up the black foam and place it in the box, then scoop up the phone and place it in the box, and finally pick up the lid, put it on the box, and press it down firmly"  # Task text saved into LeRobot frames.
  prompt: "first scoop up the black foam and place it in the box, then scoop up the phone and place it in the box, and finally pick up the lid, put it on the box, and press it down firmly"  # Runtime VLA prompt sent to policy server.

robot:
  server_url: "http://192.168.12.12:8001"  # Robot-side body service URL; 12.12 is the robot.
  record_output_dir: "/home/r1lite/GalaxeaDataset/hgdagger/r1lite_pack_phone_new_state"  # Robot-local RAW parent dir; interpreted on the robot, not on the inference PC.
  record_stop_timeout: 60.0  # Seconds to wait for robot-side rosbag finalization after Ctrl-C or rollout end.
  record_topics:  # Explicit rosbag topic whitelist; avoid ros2 bag record -a because it can disturb robot control timing.
    - "/hdas/camera_head/right_raw/image_raw_color/compressed"  # Head camera compressed image used as the alignment clock.
    - "/hdas/camera_wrist_left/color/image_raw/compressed"  # Left wrist camera compressed image.
    - "/hdas/camera_wrist_right/color/image_raw/compressed"  # Right wrist camera compressed image.
    - "/hdas/feedback_arm_left"  # Left arm joint feedback.
    - "/hdas/feedback_arm_right"  # Right arm joint feedback.
    - "/hdas/feedback_torso"  # Torso joint feedback.
    - "/hdas/feedback_gripper_left"  # Left gripper feedback.
    - "/hdas/feedback_gripper_right"  # Right gripper feedback.

local:
  raw_dir: "/home/robot/wangbo/project/VLA-RL/conrft-r1lite/data/RAW/r1lite_pack_phone_new"  # Same RAW parent dir as r1lite_pack_phone_new.
  lerobot_root: "/home/robot/wangbo/project/VLA-RL/conrft-r1lite/data/lerobot_openpi"  # Parent directory for OpenPI LeRobot datasets.
  record_sync_dest: "/home/ps/VLA-RL/conrft-r1lite/data/RAW/r1lite_pack_phone_new"  # Optional rsync destination.
  record_sync_ssh: "r1lite@192.168.12.12"  # SSH target used to pull robot-local bags to the inference PC.

rollout:
  policy_host: "localhost"  # OpenPI websocket policy server host, from the inference PC.
  policy_port: 8000  # OpenPI websocket policy server port. serve_policy.py的监听端口
  control_hz: 10.0  # Command frequency for policy and HG-Dagger intervention ticks.
  actions_per_infer: 5  # Phone assembly is contact-sensitive; start with one policy action per inference.
  timeout: 10.0  # HTTP timeout for robot server requests.
  rtc:
    enabled: false  # Enable Real-Time Chunking rollout mode.
    latency_k: 4  # RTC latency shift and action-buffer front trim in control steps.
    inference_rate: 3.0  # Background RTC policy query rate in Hz.
    max_guidance_weight: 10.0  # Clamp for RTC denoising guidance weight.
  gripper_open_value: 100.0  # Robot gripper command for open.
  gripper_close_value: 0.0  # Robot gripper command for closed.
  gripper_threshold: 75.0  # Backward-compatible default when side-specific thresholds are not consumed.
  left_gripper_threshold: 50.0  # Left raw gripper <= 50 is treated as closed in policy observation state.
  right_gripper_threshold: 98.0  # Right raw gripper <= 98 is treated as closed in policy observation state.

hg_dagger:
  teleop_source: "tabletop"  # Human takeover source: spacemouse or tabletop.
  intervention_arm: "dual"  # SpaceMouse intervention target when teleop_source=spacemouse: left, right, or dual.
  teleop_calibrate_seconds: 0.5  # Keep SpaceMouse still for this long before rollout starts.
  teleop_trans_deadzone: 0.08  # Translation deadzone after bias removal.
  teleop_rot_deadzone: 0.08  # Rotation deadzone after bias removal.
  intervention_activate_threshold: 0.001  # Motion norm threshold to start human intervention.
  intervention_release_threshold: 0.001  # Motion norm threshold to keep human intervention active.
  teleop_xyz_scale: 0.03  # Physical SpaceMouse translation scale in meters per control tick.
  teleop_rot_scale: 0.20  # Physical SpaceMouse rotation scale in radians per control tick.
  teleop_idle_seconds: 1.0  # SpaceMouse idle time before prompting to save or discard a recorded intervention segment.
  takeover_http_path: "/takeover/set_active"  # Robot server endpoint used to enable/disable tabletop takeover.
  takeover_switch_delay_sec: 0.5  # Delay around tabletop takeover/release handoff.
  tabletop_release_key: "enter"  # Keyboard release key during tabletop takeover; JoyCon Y/X still save/discard via operator events.
  tabletop_restore_timeout_sec: 5.0  # Max wait for robot joints to return to takeover-start state after discard restore.
  tabletop_restore_joint_tolerance: 0.03  # Max joint error accepted after discard restore.
  operator_event_host: "0.0.0.0"  # Inference-PC host for tabletop/JoyCon operator event HTTP receiver.
  operator_event_port: 18001  # Inference-PC port for tabletop/JoyCon operator event HTTP receiver.
  operator_event_path: "/teleop/operator_event"  # HTTP path used by the tabletop/JoyCon operator event client.

data:
  fps: 10  # Export frequency for RAW rosbag to LeRobot conversion.
  raw_dir_glob: "*_RAW"  # Child directory pattern when raw_dir is a parent dir.
  recursive: true  # Recursively find RAW episodes under per-rollout session directories.
  gripper_threshold: 75.0  # Backward-compatible default when side-specific thresholds are not consumed.
  left_gripper_threshold: 50.0  # Left raw gripper <= 50 is converted to closed action/state.
  right_gripper_threshold: 98.0  # Right raw gripper <= 98 is converted to closed action/state.
  image_writer_processes: 0  # Avoid extra image writer processes on memory-constrained conversion machines.
  image_writer_threads: 1  # Lower parallelism makes conversion slower but much less likely to freeze the PC.
  video_backend: null  # Use LeRobot's default video backend.

action_spaces:
  abs_joint:
    runner: "scripts/run_r1lite_openpi_policy.py"  # Rollout script for joint-delta policies.
    converter: "examples/r1lite/1convert_r1lite_raw_to_lerobot_abs_joint.py"  # RAW to LeRobot converter.
    train_config: "pi05_r1lite_pack_phone_new_state_abs_joint_lora"  # 必须定义在src/openpi/training/config.py
    repo_id: "r1lite_pack_phone_new_abs_joint"  # Same LeRobot repo id and norm-stat asset id as r1lite_pack_phone_new.
    lerobot_dir: "/home/robot/wangbo/project/VLA-RL/conrft-r1lite/data/lerobot_openpi/r1lite_pack_phone_new_abs_joint"  # Same output dataset root as r1lite_pack_phone_new.